apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-api
spec:
  replicas: 6
  selector:
    matchLabels:
      app: flask
      role: api
  template:
    metadata:
      labels:
        app: flask
        role: api
    spec:
      containers:
      - name: flask
        image: my-flask-app:v3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        env:
        - name: SERVICE_MODE
          value: "api"
        envFrom: 
        - configMapRef:
            name: flask-config
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10