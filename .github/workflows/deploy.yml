name: Rolling deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE: ${{ secrets.DOCKER_USER }}/my-flask-app:${{ github.sha }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
         
    - name : login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}
    
    - name : Build image
      run: docker build -t $IMAGE .

    - name : Push image
      run: docker push $IMAGE

    - name: deploy EC2-1
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST_1 }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
            set -e
            docker tag ${{ secrets.DOCKER_USER }}/my-flask-app:${{ github.sha }} $PREVIOUS_IMAGE || true
            docker image pull ${{ secrets.DOCKER_USER }}/my-flask-app:${{ github.sha }}
            docker stop flask-app || true
            docker rm flask-app || true
            docker run -d -p 5000:5000 --name flask-app ${{ secrets.DOCKER_USER }}/my-flask-app:${{ github.sha }}
            
    - name: Wait for EC2-1 health via ALB
      run: |
          echo "Waiting for ALB to register EC2-1 as healthy..."
          for i in {1..20}; do
            curl -s http://${{ secrets.ALB_DNS }}/health && exit 0
            sleep 5
          done
          echo "EC2-1 not healthy - Rollback and exit"
          exit 1

    - name: Deploy EC2-2
      uses: appleboy/ssh-action@v1.0.3
      with:
          host: ${{ secrets.EC2_HOST_2 }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker tag ${{ secrets.DOCKER_USER }}/my-flask-app:${{ github.sha }} $PREVIOUS_IMAGE || true
            docker image pull ${{ secrets.DOCKER_USER }}/my-flask-app:${{ github.sha }}
            docker stop flask-app || true
            docker rm flask-app || true
            docker run -d -p 5000:5000 --name flask-app  ${{ secrets.DOCKER_USER }}/my-flask-app:${{ github.sha }}

    - name: Final Check health via ALB
      run: |
          echo "Waiting for ALB to register..."
          for i in {1..20}; do
            curl -s http://${{ secrets.ALB_DNS }}/health && exit 0
            sleep 5
          done
          echo " Rollback and exit"
          exit 1    

    - name: Rollback EC2-1
      if: failure()
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST_1 }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker stop app || true
          docker rm app || true
          docker run -d -p 5000:5000 --name app $PREVIOUS_IMAGE
    
    - name: Rollback EC2-2
      if: failure()
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST_2 }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker stop app || true
          docker rm app || true
          docker run -d -p 5000:5000 --name app $PREVIOUS_IMAGE