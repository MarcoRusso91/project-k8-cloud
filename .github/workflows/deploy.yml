name: Rolling deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE: ${{ secrets.DOCKER_USER }}/my-flask-app:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: test 
      run: |
        echo ${{ secrets.DOCKER_USER }}
        echo ${{ secrets.DOCKER_PASS }}
         
    - name : login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}
    
    - name : Build image
      run: docker build -t $IMAGE .

    - name : Push image
      run: docker push $IMAGE

    - name: deploy EC2-1
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST_1 }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
            docker pull $IMAGE
            docker stop flask-app || true
            docker rm flask-app || true
            docker run -d -p 5000:5000 --name flask-app $IMAGE
            
    - name: Wait for EC2-1 health via ALB
      run: |
          echo "Waiting for ALB to register EC2-1 as healthy..."
          for i in {1..20}; do
            curl -s http://$ALB_DNS/health && exit 0
            sleep 5
          done
          echo "EC2-1 not healthy"
          exit 1

    - name: Deploy EC2-2
      uses: appleboy/ssh-action@v1.0.3
      with:
          host: ${{ secrets.EC2_HOST_2 }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull $IMAGE
            docker stop flask-app || true
            docker rm flask-app || true
            docker run -d -p 5000:5000 --name flask-app $IMAGE

    
